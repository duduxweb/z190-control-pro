<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Z190 Control Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#070a10;--bg1:#0d1220;--bg2:#131c2e;--bg3:#1a253c;--bg4:#21304a;
      --bdr:rgba(45,80,140,.3);--bdr-hi:rgba(60,130,255,.5);
      --blue:#3d8fff;--cyan:#00d4e8;--green:#00e87a;--amber:#ffb830;--red:#ff3f3f;--purple:#b06fff;
      --t1:#ddeeff;--t2:#7090b8;--t3:#3a5070;
      --mono:'Share Tech Mono',monospace;
      --cond:'Barlow Condensed',sans-serif;
      --sans:'Barlow',sans-serif;
    }
    body{font-family:var(--sans);background:var(--bg0);color:var(--t1);min-height:100vh;
      background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px)}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg0)}
    ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

    /* ── Layout ── */
    .wrap{max-width:1360px;margin:0 auto;padding:0 16px 48px}

    /* ── Header ── */
    .header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;
      border-bottom:1px solid var(--bdr);margin-bottom:20px;position:relative}
    .header::after{content:'';position:absolute;bottom:-1px;left:0;width:80px;height:2px;
      background:linear-gradient(90deg,var(--blue),transparent)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-rec{width:11px;height:11px;border-radius:50%;background:var(--red);
      box-shadow:0 0 10px var(--red)}
    .brand-rec.idle{background:var(--t3);box-shadow:none}
    .brand h1{font-family:var(--cond);font-size:1.6rem;font-weight:700;letter-spacing:.04em;
      color:var(--t1)}
    .brand-sub{font-family:var(--mono);font-size:.68rem;color:var(--t3);margin-top:1px}
    .hstatus{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--t2)}
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .dot.online{background:var(--green);box-shadow:0 0 7px var(--green)}
    .dot.offline{background:var(--red);box-shadow:0 0 7px var(--red)}
    .dot.loading{background:var(--amber);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── Tabs ── */
    .tabs{display:flex;gap:3px;margin-bottom:20px;background:var(--bg1);
      border:1px solid var(--bdr);border-radius:8px;padding:4px}
    .tab{flex:1;padding:9px 12px;background:transparent;border:none;
      font-family:var(--cond);font-size:.95rem;font-weight:500;letter-spacing:.04em;
      color:var(--t3);cursor:pointer;border-radius:5px;transition:all .2s;text-transform:uppercase}
    .tab:hover{color:var(--t2);background:var(--bg3)}
    .tab.active{background:var(--blue);color:#fff}

    /* ── Section title ── */
    .sec-title{font-family:var(--cond);font-size:.72rem;font-weight:600;letter-spacing:.12em;
      text-transform:uppercase;color:var(--t3);margin-bottom:10px;
      display:flex;align-items:center;gap:6px}
    .sec-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

    /* ── Main grid ── */
    .main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    @media(max-width:900px){.main-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:560px){.main-grid{grid-template-columns:1fr}}
    .col-span2{grid-column:span 2}
    @media(max-width:900px){.col-span2{grid-column:span 1}}

    /* ── Exposure block (big panels) ── */
    .panel{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;
      padding:14px 16px;transition:border-color .2s}
    .panel:hover{border-color:var(--bdr-hi)}
    .panel-label{font-family:var(--cond);font-size:.68rem;font-weight:600;letter-spacing:.12em;
      text-transform:uppercase;color:var(--t3);margin-bottom:6px}
    .panel-value{font-family:var(--mono);font-size:2rem;font-weight:400;line-height:1;
      color:var(--t1)}
    .panel-value.big{font-size:2.6rem}
    .panel-value.med{font-size:1.5rem}
    .panel-sub{font-size:.75rem;color:var(--t2);margin-top:5px;font-family:var(--mono)}
    .panel-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;
      border-radius:20px;font-size:.7rem;font-family:var(--cond);font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
    .badge-manual{background:rgba(61,143,255,.12);color:var(--blue);border:1px solid rgba(61,143,255,.3)}
    .badge-auto{background:rgba(0,232,122,.12);color:var(--green);border:1px solid rgba(0,232,122,.3)}
    .badge-atw{background:rgba(176,111,255,.12);color:var(--purple);border:1px solid rgba(176,111,255,.3)}

    /* ── Status row (rec, tc, etc) ── */
    .status-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .status-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
      border-radius:5px;font-family:var(--cond);font-size:.82rem;font-weight:600;
      letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--bdr);
      background:var(--bg2)}
    .status-chip.rec-on{background:rgba(255,63,63,.15);border-color:rgba(255,63,63,.5);
      color:var(--red);animation:rec-pulse 1.2s infinite}
    @keyframes rec-pulse{0%,100%{box-shadow:0 0 4px rgba(255,63,63,.3)}50%{box-shadow:0 0 12px rgba(255,63,63,.6)}}
    .status-chip.idle{color:var(--t3)}
    .status-chip.ok{background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.3);color:var(--green)}

    /* ── Data table ── */
    .data-table{width:100%;border-collapse:collapse}
    .data-table tr{border-bottom:1px solid rgba(45,80,140,.2)}
    .data-table tr:last-child{border-bottom:none}
    .data-table td{padding:7px 4px;font-size:.82rem}
    .data-table td:first-child{color:var(--t3);font-family:var(--cond);font-size:.72rem;
      font-weight:600;letter-spacing:.06em;text-transform:uppercase;width:48%;padding-right:8px}
    .data-table td:last-child{font-family:var(--mono);color:var(--t1);font-size:.82rem}

    /* ── WB Kelvin memories ── */
    .wb-memories{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
    .wb-mem{flex:1;min-width:60px;background:var(--bg3);border:1px solid var(--bdr);
      border-radius:6px;padding:6px 8px;text-align:center}
    .wb-mem.active{border-color:var(--cyan);background:rgba(0,212,232,.08)}
    .wb-mem-label{font-family:var(--cond);font-size:.62rem;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
    .wb-mem-val{font-family:var(--mono);font-size:.95rem;color:var(--t1)}
    .wb-mem.active .wb-mem-val{color:var(--cyan)}

    /* ── Audio bars ── */
    .audio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
    .audio-ch{text-align:center}
    .audio-label{font-family:var(--cond);font-size:.62rem;color:var(--t3);
      font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
    .audio-bar-wrap{height:48px;background:var(--bg1);border:1px solid var(--bdr);
      border-radius:4px;overflow:hidden;display:flex;flex-direction:column-reverse}
    .audio-bar{width:100%;background:var(--green);border-radius:2px;transition:height .15s}
    .audio-bar.peak{background:var(--red)}

    /* ── Refresh bar ── */
    .refresh-bar{height:2px;background:var(--bg3);border-radius:1px;
      margin-bottom:14px;overflow:hidden}
    .refresh-inner{height:100%;background:var(--blue);border-radius:1px;
      transition:width 1s linear}

    /* ── Toast ── */
    .toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
    .toast{padding:10px 16px;border-radius:6px;font-size:.83rem;font-weight:500;
      animation:tin .25s ease;box-shadow:0 4px 16px rgba(0,0,0,.5)}
    .toast.success{background:var(--green);color:#000}
    .toast.error{background:var(--red);color:#fff}
    .toast.info{background:var(--blue);color:#fff}
    @keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* ── Form ── */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-family:var(--cond);font-size:.7rem;font-weight:600;
      letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
    .form-input{width:100%;padding:9px 12px;background:var(--bg1);border:1px solid var(--bdr);
      border-radius:6px;color:var(--t1);font-family:var(--sans);font-size:.88rem;transition:border-color .2s}
    .form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,143,255,.15)}
    .form-input::placeholder{color:var(--t3)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;
      border-radius:6px;font-family:var(--cond);font-size:.9rem;font-weight:600;
      letter-spacing:.04em;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2a7cf5}
    .btn-outline{background:transparent;color:var(--t2);border:1px solid var(--bdr)}
    .btn-outline:hover{color:var(--t1);border-color:var(--t2)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:520px){.grid2{grid-template-columns:1fr}}
    .spinner{width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--blue);
      border-radius:50%;animation:spin .5s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Empty / Error ── */
    .empty{text-align:center;padding:48px 20px;color:var(--t3)}
    .empty p{font-size:.9rem;margin-top:8px}

    /* ── Tag ── */
    .tag{display:inline-block;padding:2px 6px;border-radius:3px;
      font-family:var(--mono);font-size:.72rem;background:var(--bg3);color:var(--t2);
      border:1px solid var(--bdr)}
    .tag.on{background:rgba(0,232,122,.1);color:var(--green);border-color:rgba(0,232,122,.3)}
    .tag.off{background:rgba(255,63,63,.08);color:var(--red);border-color:rgba(255,63,63,.25)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Toast ──────────────────────────────────────────────────────────────── */
let _tid = 0; const _tl = new Set();
function toast(msg, type='info') {
  const id = ++_tid;
  _tl.forEach(f => f({id,msg,type}));
  setTimeout(()=> _tl.forEach(f => f({rm:id})), 3200);
}
function Toasts() {
  const [list, setList] = useState([]);
  useEffect(()=>{
    const h = ev => { if(ev.rm) setList(l=>l.filter(x=>x.id!==ev.rm)); else setList(l=>[...l.slice(-3),ev]); };
    _tl.add(h); return ()=>_tl.delete(h);
  },[]);
  return <div className="toasts">{list.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>;
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
const fmt = v => (v==null||v===''||v===undefined) ? '—' : String(v);
const fmtBool = v => v==null ? '—' : (v ? <span className="tag on">ON</span> : <span className="tag off">OFF</span>);
const badge = (method) => {
  if (!method) return null;
  const m = String(method).toLowerCase();
  if (m==='automatic'||m==='auto') return <span className="panel-badge badge-auto">Auto</span>;
  if (m==='atw') return <span className="panel-badge badge-atw">ATW</span>;
  return <span className="panel-badge badge-manual">{method}</span>;
};

/* ── Dashboard ───────────────────────────────────────────────────────────── */
function Dashboard() {
  const [s, setS] = useState(null);
  const [err, setErr] = useState(null);
  const [prog, setProg] = useState(100);
  const [auto, setAuto] = useState(true);
  const iv = useRef(null);
  const INTERVAL = 4000;

  const load = useCallback(async () => {
    try {
      const r = await fetch('/api/camera/status');
      const d = await r.json();
      if (d.error && !d.connected) { setErr(d.error); setS(null); }
      else { setS(d); setErr(null); }
    } catch(e) { setErr('Sem resposta do servidor'); }
  }, []);

  useEffect(()=>{
    load();
    if (auto) {
      iv.current = setInterval(()=>{ load(); setProg(0); setTimeout(()=>setProg(100),80); }, INTERVAL);
      return ()=>clearInterval(iv.current);
    }
  },[auto, load]);

  if (!s && !err) return <div className="empty"><div className="spinner" style={{width:28,height:28,margin:'0 auto 12px'}}></div><p>Conectando à câmera...</p></div>;

  if (err) return (
    <div className="panel" style={{borderColor:'rgba(255,63,63,.4)'}}>
      <div style={{color:'var(--red)',fontFamily:'var(--cond)',fontSize:'1rem',fontWeight:700,marginBottom:8}}>⚠ Câmera inacessível</div>
      <p style={{color:'var(--t2)',fontSize:'.85rem',marginBottom:12}}>{err}</p>
      <button className="btn btn-outline" onClick={load}>↻ Tentar novamente</button>
    </div>
  );

  // Rec status
  const recMain = fmt(s.rec_main);
  const isRec   = recMain.toLowerCase().includes('rec') || recMain.toLowerCase() === 'recording';
  const mbStatus = fmt(s.mediabox_status);

  // Audio bars pct (0-4 → 0-100%)
  const audioPct = ch => { const v = s.audio?.[ch]; if(v==null)return 0; return Math.min(100, (v/4)*100); };

  return (
    <div>
      {/* Status bar */}
      <div className="status-row">
        <div className={`status-chip ${isRec?'rec-on':'idle'}`}>
          {isRec ? '● REC' : '○ IDLE'}
        </div>
        {s.mediabox_mode && <div className="status-chip">{s.mediabox_mode}</div>}
        {s.timecode && <div className="status-chip ok" style={{fontFamily:'var(--mono)',fontSize:'.78rem'}}>{s.timecode}</div>}
        {s.colorbars && <div className="status-chip" style={{color:'var(--amber)',borderColor:'rgba(255,184,48,.4)'}}>◈ BARS {s.colorbars_type}</div>}
        {s.shooting_mode && <div className="status-chip">{s.shooting_mode}</div>}
      </div>

      {/* Refresh bar */}
      {auto && <div className="refresh-bar"><div className="refresh-inner" style={{width:prog+'%'}}></div></div>}

      {/* Controls bar */}
      <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:8,marginBottom:12}}>
        <label style={{fontSize:'.78rem',color:'var(--t3)',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
          <input type="checkbox" checked={auto} onChange={e=>setAuto(e.target.checked)}/> Auto {INTERVAL/1000}s
        </label>
        <button className="btn btn-outline" style={{padding:'5px 12px',fontSize:'.78rem'}} onClick={load}>↻</button>
      </div>

      {/* ── Exposição ── */}
      <div className="sec-title">Exposição</div>
      <div className="main-grid" style={{marginBottom:16}}>
        {/* Iris */}
        <div className="panel">
          <div className="panel-label">Iris</div>
          <div className="panel-value big">f{fmt(s.iris)}</div>
          {badge(s.iris_method)}
          {s.iris_closed && <span className="panel-badge badge-manual" style={{marginLeft:4}}>FECHADA</span>}
        </div>
        {/* Gain */}
        <div className="panel">
          <div className="panel-label">Ganho</div>
          <div className="panel-value big">{fmt(s.gain)}</div>
          {badge(s.gain_method)}
          {s.gain_mode && <div className="panel-sub">Modo: {s.gain_mode}</div>}
        </div>
        {/* Shutter */}
        <div className="panel">
          <div className="panel-label">Shutter</div>
          <div className="panel-value big">{fmt(s.shutter)}</div>
          {badge(s.shutter_method)}
          <div className="panel-sub">
            {s.shutter_mode && `Modo: ${s.shutter_mode}`}
            {s.shutter_ecs ? ' · ECS ON' : ''}
          </div>
        </div>
        {/* ND */}
        <div className="panel">
          <div className="panel-label">Filtro ND</div>
          <div className="panel-value">{fmt(s.nd)}</div>
          {badge(s.nd_method)}
        </div>
        {/* WB */}
        <div className="panel col-span2">
          <div className="panel-label">White Balance</div>
          <div style={{display:'flex',alignItems:'baseline',gap:12}}>
            <div className="panel-value">{fmt(s.wb_mode)}</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',color:'var(--cyan)'}}>{s.wb_kelvin ? s.wb_kelvin+'K' : '—'}</div>
          </div>
          {badge(s.wb_method)}
          <div className="wb-memories">
            {[['Preset', s.wb_kelvin_preset],['Mem A', s.wb_kelvin_memA],['Mem B', s.wb_kelvin_memB]].map(([lbl,val])=>(
              <div key={lbl} className={`wb-mem ${s.wb_mode===( lbl==='Mem A'?'Memory A':lbl==='Mem B'?'Memory B':lbl)?'active':''}`}>
                <div className="wb-mem-label">{lbl}</div>
                <div className="wb-mem-val">{val ? val+'K' : '—'}</div>
              </div>
            ))}
            <div className={`wb-mem ${s.wb_mode==='ATW'?'active':''}`}>
              <div className="wb-mem-label">ATW</div>
              <div className="wb-mem-val" style={{fontSize:'.75rem'}}>{s.wb_atw_active===true ? 'ativo' : s.wb_mode==='ATW'?'ativo':'—'}</div>
            </div>
          </div>
        </div>
      </div>

      {/* ── Ótica ── */}
      <div className="sec-title">Ótica / Foco</div>
      <div className="main-grid" style={{marginBottom:16}}>
        <div className="panel">
          <div className="panel-label">Zoom</div>
          <div className="panel-value big">{fmt(s.zoom)}</div>
          <div className="panel-sub">velocidade: {fmt(s.zoom_velocity)}</div>
        </div>
        <div className="panel">
          <div className="panel-label">Foco</div>
          <div className="panel-value med">{s.focus_distance ? s.focus_distance + (s.focus_unit ? ' '+s.focus_unit : '') : '—'}</div>
          {badge(s.focus_method)}
        </div>
        <div className="panel">
          <div className="panel-label">Lente</div>
          <div className="panel-value med" style={{fontSize:'1rem',paddingTop:4}}>{fmt(s.lens_mount)}</div>
          <div className="panel-sub">S&Q: {fmtBool(s.sqmotion)} {s.sqmotion_fps ? s.sqmotion_fps+'fps' : ''}</div>
        </div>
      </div>

      {/* ── Gravação ── */}
      <div className="sec-title">Gravação & Clip</div>
      <div className="main-grid" style={{marginBottom:16}}>
        <div className="panel">
          <div className="panel-label">Status</div>
          <table className="data-table">
            <tbody>
              {[['Main',s.rec_main],['Proxy',s.rec_proxy],['SD',s.rec_sd],['Stream',s.rec_streaming]].map(([l,v])=>v?
                <tr key={l}><td>{l}</td><td><span className={`tag ${String(v).toLowerCase().includes('rec')?'on':''}`}>{v}</span></td></tr>:null
              )}
            </tbody>
          </table>
        </div>
        <div className="panel">
          <div className="panel-label">Timecode</div>
          <div className="panel-value" style={{fontSize:'1.4rem',letterSpacing:'.04em'}}>{s.timecode||'—'}</div>
          <div className="panel-sub">
            {s.timecode_type && `Tipo: ${s.timecode_type}`}
            {s.timecode_locked!=null && (s.timecode_locked ? ' · LOCKED' : ' · FREE')}
          </div>
        </div>
        <div className="panel">
          <div className="panel-label">Formato de Vídeo</div>
          <table className="data-table">
            <tbody>
              {[
                ['FPS', s.video_fps],
                ['Codec', s.video_codec],
                ['Resolução', s.video_width&&s.video_height ? `${s.video_width}×${s.video_height}` : null],
                ['Scan', s.video_scan],
                ['Bitrate', s.video_bitrate ? s.video_bitrate+'Mbps' : null],
                ['Chroma', s.video_chroma],
              ].filter(([,v])=>v).map(([l,v])=>(
                <tr key={l}><td>{l}</td><td>{v}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Paint / Sistema ── */}
      <div className="sec-title">Paint & Sistema</div>
      <div className="main-grid" style={{marginBottom:16}}>
        <div className="panel">
          <div className="panel-label">Gamma</div>
          <div className="panel-value med">{s.gamma_value || s.gamma_type || '—'}</div>
          <div className="panel-sub">HDR: {fmt(s.gamma_hdr_value)} · Enabled: {fmt(String(s.gamma_enabled))}</div>
        </div>
        <div className="panel">
          <div className="panel-label">Bateria</div>
          <div className="panel-value big" style={{color: s.battery_pct<20 ? 'var(--red)' : s.battery_pct<40 ? 'var(--amber)' : 'var(--green)'}}>
            {s.battery_pct!=null ? s.battery_pct+'%' : '—'}
          </div>
          <div className="panel-sub">
            {s.battery_min!=null ? `${s.battery_min}min` : ''}
            {s.battery_v!=null ? ` · ${s.battery_v}V` : ''}
            {s.battery_type ? ` · ${s.battery_type}` : ''}
          </div>
        </div>
        <div className="panel">
          <div className="panel-label">Storage</div>
          <table className="data-table">
            <tbody>
              {s.storage_avail && Object.entries(s.storage_avail).map(([k,v])=>(
                <tr key={k}><td>{k}</td><td>{v}</td></tr>
              ))}
              {s.storage_status && Object.entries(s.storage_status).map(([k,v])=>(
                <tr key={'st_'+k}><td>Status {k}</td><td><span className={`tag ${v==='Ready'?'on':''}`}>{v}</span></td></tr>
              ))}
              {!s.storage_avail && !s.storage_status && <tr><td colSpan="2" style={{color:'var(--t3)'}}>—</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Áudio ── */}
      <div className="sec-title">Nível de Áudio (VU)</div>
      <div className="panel" style={{marginBottom:16}}>
        <div className="audio-grid">
          {['ch1','ch2','ch3','ch4'].map(ch => {
            const pct = audioPct(ch);
            return (
              <div className="audio-ch" key={ch}>
                <div className="audio-label">{ch.toUpperCase()}</div>
                <div className="audio-bar-wrap">
                  <div className="audio-bar" style={{height:pct+'%',background:pct>=100?'var(--red)':pct>=75?'var(--amber)':'var(--green)'}}></div>
                </div>
                <div style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--t3)',marginTop:3,textAlign:'center'}}>
                  {s.audio?.[ch]!=null ? s.audio[ch] : '—'}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Last update ── */}
      <div style={{textAlign:'right',fontSize:'.68rem',color:'var(--t3)',fontFamily:'var(--mono)'}}>
        última atualização: {s.lastUpdate ? new Date(s.lastUpdate).toLocaleTimeString('pt-BR') : '—'}
      </div>
    </div>
  );
}

/* ── Config ──────────────────────────────────────────────────────────────── */
function Config({ onSave }) {
  const [ip,setIp]=useState('192.168.100.41');
  const [user,setUser]=useState('admin');
  const [pass,setPass]=useState('');
  const [port,setPort]=useState(80);
  const [testing,setTesting]=useState(false);
  const [saving,setSaving]=useState(false);
  const [result,setResult]=useState(null);

  useEffect(()=>{
    fetch('/api/config/full').then(r=>r.json()).then(c=>{
      setIp(c.camera?.ip||'192.168.100.41');
      setUser(c.camera?.user||'admin');
      setPass(c.camera?.password||'');
      setPort(c.camera?.port||80);
    }).catch(()=>{});
  },[]);

  const test = async () => {
    setTesting(true); setResult(null);
    try {
      const r = await fetch('/api/config/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip,user,password:pass})});
      const d = await r.json();
      setResult(d);
      toast(d.ok ? '✓ Camera acessível!' : d.message, d.ok?'success':'error');
    } catch(e){ toast('Erro: '+e.message,'error'); }
    setTesting(false);
  };

  const save = async () => {
    setSaving(true);
    try {
      const r = await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({camera:{ip,user,password:pass,port:Number(port)}})});
      const d = await r.json();
      if(d.ok){ toast('✓ Salvo!','success'); if(onSave)onSave(); }
      else toast('Erro ao salvar','error');
    } catch(e){ toast(e.message,'error'); }
    setSaving(false);
  };

  return (
    <div>
      <div className="panel">
        <div className="sec-title" style={{marginBottom:14}}>Câmera</div>
        <div className="grid2">
          <div className="form-group">
            <label className="form-label">IP da Câmera</label>
            <input className="form-input" value={ip} onChange={e=>setIp(e.target.value)} placeholder="192.168.100.41"/>
          </div>
          <div className="form-group">
            <label className="form-label">Porta</label>
            <input className="form-input" type="number" value={port} onChange={e=>setPort(e.target.value)} placeholder="80"/>
          </div>
          <div className="form-group">
            <label className="form-label">Usuário</label>
            <input className="form-input" value={user} onChange={e=>setUser(e.target.value)} placeholder="admin"/>
          </div>
          <div className="form-group">
            <label className="form-label">Senha</label>
            <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Senha"/>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginTop:4}}>
          <button className="btn btn-outline" onClick={test} disabled={testing}>
            {testing?<span className="spinner"></span>:null} {testing?'Testando...':'Testar Conexão'}
          </button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>
            {saving?<span className="spinner"></span>:null} {saving?'Salvando...':'Salvar'}
          </button>
          {result && (
            <span style={{fontSize:'.8rem',color:result.ok?'var(--green)':'var(--red)',fontFamily:'var(--mono)'}}>
              {result.ok ? '✓ OK' : '✗ '+result.message}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('dashboard');
  const [online, setOnline] = useState('loading');

  useEffect(()=>{
    const check = async () => {
      try {
        const r = await fetch('/api/camera/status');
        const d = await r.json();
        setOnline(d.connected ? 'online' : 'offline');
      } catch { setOnline('offline'); }
    };
    check();
    const iv = setInterval(check, 8000);
    return ()=>clearInterval(iv);
  },[]);

  // Rec dot — read from status
  const [recActive, setRecActive] = useState(false);
  useEffect(()=>{
    const iv = setInterval(async ()=>{
      try { const r=await fetch('/api/camera/status'); const d=await r.json();
        setRecActive(d.connected && String(d.rec_main||'').toLowerCase().includes('rec')); } catch {}
    },2000);
    return ()=>clearInterval(iv);
  },[]);

  return (
    <div className="wrap">
      <Toasts/>
      <div className="header">
        <div className="brand">
          <div className={`brand-rec ${recActive?'':'idle'}`}></div>
          <div>
            <h1>Z190 Control Pro</h1>
            <div className="brand-sub">Sony PXW-Z190 · Savona 2.8.1</div>
          </div>
        </div>
        <div className="hstatus">
          <span className={`dot ${online}`}></span>
          {online==='online'?'Online':online==='offline'?'Offline':'Verificando...'}
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${tab==='dashboard'?'active':''}`} onClick={()=>setTab('dashboard')}>Dashboard</button>
        <button className={`tab ${tab==='config'?'active':''}`} onClick={()=>setTab('config')}>Configuração</button>
      </div>

      {tab==='dashboard' && <Dashboard/>}
      {tab==='config'    && <Config onSave={()=>setOnline('loading')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
