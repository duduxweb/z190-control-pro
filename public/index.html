<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Z190 Control Madruga v2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --bg-card: #1a2332;
      --bg-card-hover: #1f2b3d;
      --bg-input: #0d1420;
      --border: #2a3548;
      --border-focus: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.1);
      --rec-red: #ef4444;
      --rec-glow: rgba(239,68,68,0.4);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .app-container { max-width: 1400px; margin: 0 auto; padding: 16px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .header .version { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono); }
    .header-right { display: flex; align-items: center; gap: 12px; }

    /* ── Status Indicator ── */
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .status-dot.checking { background: var(--warning); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes rec-pulse { 0%,100% { box-shadow: 0 0 4px var(--rec-glow); } 50% { box-shadow: 0 0 16px var(--rec-glow); } }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; background: var(--bg-secondary);
      border-radius: var(--radius); padding: 4px; margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 10px 16px; border: none; background: transparent;
      color: var(--text-secondary); font-family: var(--font-sans); font-size: 0.875rem;
      font-weight: 500; cursor: pointer; border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text-primary); background: var(--bg-card); }
    .tab.active { color: var(--text-primary); background: var(--accent); }

    /* ── Cards ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-icon { width: 20px; height: 20px; opacity: 0.7; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    }

    /* ── Form Elements ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input, .form-select {
      width: 100%; padding: 10px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-sans); font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus {
      outline: none; border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-input::placeholder { color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-sans); font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { color: var(--text-primary); border-color: var(--text-secondary); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* ── Status Value Display ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .stat-item {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      transition: border-color 0.2s;
    }
    .stat-item:hover { border-color: var(--accent); }
    .stat-label {
      font-size: 0.7rem; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.25rem; font-weight: 700; font-family: var(--font-mono);
      color: var(--text-primary);
    }
    .stat-value.highlight { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.danger { color: var(--danger); }

    /* ── Toast ── */
    .toast-container {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 500;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .toast.success { background: var(--success); color: white; }
    .toast.error { background: var(--danger); color: white; }
    .toast.info { background: var(--accent); color: white; }
    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* ── Loading Spinner ── */
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
    }
    .badge-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Refresh indicator ── */
    .refresh-bar {
      height: 3px; background: var(--bg-secondary); border-radius: 2px;
      margin-bottom: 16px; overflow: hidden;
    }
    .refresh-bar-inner {
      height: 100%; background: var(--accent); border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ─── Toast System ────────────────────────────────────────────────────────
    let toastId = 0;
    const toastListeners = new Set();
    function showToast(msg, type = 'info') {
      const id = ++toastId;
      toastListeners.forEach(fn => fn({ id, msg, type }));
      setTimeout(() => toastListeners.forEach(fn => fn({ remove: id })), 3500);
    }

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      useEffect(() => {
        const handler = (ev) => {
          if (ev.remove) setToasts(t => t.filter(x => x.id !== ev.remove));
          else setToasts(t => [...t.slice(-4), ev]);
        };
        toastListeners.add(handler);
        return () => toastListeners.delete(handler);
      }, []);
      return (
        <div className="toast-container">
          {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
        </div>
      );
    }

    // ─── SVG Icons ───────────────────────────────────────────────────────────
    const Icons = {
      camera: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
      settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      wifi: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
      refresh: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
      sun: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
      aperture: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="14.31" y1="8" x2="20.05" y2="17.94"/><line x1="9.69" y1="8" x2="21.17" y2="8"/><line x1="7.38" y1="12" x2="13.12" y2="2.06"/><line x1="9.69" y1="16" x2="3.95" y2="6.06"/><line x1="14.31" y1="16" x2="2.83" y2="16"/><line x1="16.62" y1="12" x2="10.88" y2="21.94"/></svg>,
      video: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
      mic: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>,
      zap: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      disc: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>,
    };

    // ─── Configuration Page ──────────────────────────────────────────────────
    function ConfigPage({ config, onSave }) {
      const [ip, setIp] = useState(config?.camera?.ip || '192.168.100.41');
      const [user, setUser] = useState(config?.camera?.user || 'admin');
      const [pass, setPass] = useState('');
      const [port, setPort] = useState(config?.camera?.port || 80);
      const [testing, setTesting] = useState(false);
      const [testResult, setTestResult] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        // Carregar config completa
        fetch('/api/config/full').then(r => r.json()).then(cfg => {
          setIp(cfg.camera?.ip || '192.168.100.41');
          setUser(cfg.camera?.user || 'admin');
          setPass(cfg.camera?.password || '');
          setPort(cfg.camera?.port || 80);
        }).catch(() => {});
      }, []);

      async function testConnection() {
        setTesting(true);
        setTestResult(null);
        try {
          const res = await fetch('/api/config/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ip, user, password: pass, port })
          });
          const data = await res.json();
          setTestResult(data);
          if (data.ok) showToast('Conexao com a camera OK!', 'success');
          else showToast(data.message, 'error');
        } catch (e) {
          setTestResult({ ok: false, message: e.message });
          showToast('Erro ao testar conexao', 'error');
        }
        setTesting(false);
      }

      async function saveConfiguration() {
        setSaving(true);
        try {
          const res = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              camera: { ip, user, password: pass, port: Number(port) }
            })
          });
          const data = await res.json();
          if (data.ok) {
            showToast('Configuracao salva com sucesso!', 'success');
            if (onSave) onSave();
          } else {
            showToast('Erro ao salvar', 'error');
          }
        } catch (e) {
          showToast('Erro: ' + e.message, 'error');
        }
        setSaving(false);
      }

      return (
        <div>
          <div className="card">
            <div className="card-header">
              <div className="card-title">
                <span className="card-icon">{Icons.settings}</span>
                Configuracao da Camera
              </div>
            </div>

            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Endereco IP da Camera</label>
                <input className="form-input" type="text" value={ip}
                  onChange={e => setIp(e.target.value)}
                  placeholder="192.168.100.41" />
              </div>
              <div className="form-group">
                <label className="form-label">Porta</label>
                <input className="form-input" type="number" value={port}
                  onChange={e => setPort(e.target.value)}
                  placeholder="80" />
              </div>
            </div>

            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Usuario</label>
                <input className="form-input" type="text" value={user}
                  onChange={e => setUser(e.target.value)}
                  placeholder="admin" />
              </div>
              <div className="form-group">
                <label className="form-label">Senha</label>
                <input className="form-input" type="password" value={pass}
                  onChange={e => setPass(e.target.value)}
                  placeholder="Senha da camera" />
              </div>
            </div>

            <hr className="divider" />

            <div style={{ display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
              <button className="btn btn-outline" onClick={testConnection} disabled={testing}>
                {testing ? <span className="spinner"></span> : <span className="card-icon">{Icons.wifi}</span>}
                {testing ? 'Testando...' : 'Testar Conexao'}
              </button>
              <button className="btn btn-primary" onClick={saveConfiguration} disabled={saving}>
                {saving ? <span className="spinner"></span> : <span className="card-icon">{Icons.check}</span>}
                {saving ? 'Salvando...' : 'Salvar Configuracao'}
              </button>

              {testResult && (
                <span className={`badge ${testResult.ok ? 'badge-success' : 'badge-danger'}`}>
                  {testResult.ok ? 'Conectado' : testResult.message}
                </span>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <div className="card-title">
                <span className="card-icon">{Icons.zap}</span>
                Informacoes do Sistema
              </div>
            </div>
            <div className="stat-grid">
              <div className="stat-item">
                <div className="stat-label">Servidor</div>
                <div className="stat-value success" style={{fontSize:'1rem'}}>Rodando</div>
              </div>
              <div className="stat-item">
                <div className="stat-label">Versao</div>
                <div className="stat-value" style={{fontSize:'1rem'}}>v2.0.0</div>
              </div>
              <div className="stat-item">
                <div className="stat-label">Proxy</div>
                <div className="stat-value highlight" style={{fontSize:'1rem'}}>{ip}:{port}</div>
              </div>
              <div className="stat-item">
                <div className="stat-label">Config</div>
                <div className="stat-value" style={{fontSize:'1rem'}}>config.json</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Dashboard Page ──────────────────────────────────────────────────────
    function DashboardPage() {
      const [status, setStatus] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [refreshProgress, setRefreshProgress] = useState(100);
      const [autoRefresh, setAutoRefresh] = useState(true);
      const intervalRef = useRef(null);
      const REFRESH_INTERVAL = 3000; // 3 segundos

      const fetchStatus = useCallback(async () => {
        try {
          const res = await fetch('/api/camera/status');
          const data = await res.json();
          if (data.error) {
            setError(data.error);
            setStatus(null);
          } else {
            setStatus(data);
            setError(null);
          }
        } catch (e) {
          setError('Sem conexao com o servidor');
          setStatus(null);
        }
        setLoading(false);
      }, []);

      useEffect(() => {
        fetchStatus();
        if (autoRefresh) {
          intervalRef.current = setInterval(() => {
            fetchStatus();
            setRefreshProgress(0);
            setTimeout(() => setRefreshProgress(100), 50);
          }, REFRESH_INTERVAL);
          return () => clearInterval(intervalRef.current);
        }
      }, [autoRefresh, fetchStatus]);

      function formatValue(val) {
        if (val === null || val === undefined) return '—';
        if (typeof val === 'object') {
          // Tentar extrair valor útil de objetos complexos
          if (val.cam !== undefined) return String(val.cam);
          if (val._n !== undefined) return String(val._n);
          const keys = Object.keys(val);
          if (keys.length === 1) return String(val[keys[0]]);
          return JSON.stringify(val);
        }
        return String(val);
      }

      function getValueClass(label, val) {
        const v = String(val).toLowerCase();
        if (v === 'true' || v === 'on' || v === 'enabled') return 'success';
        if (v === 'false' || v === 'off' || v === 'disabled') return 'danger';
        if (label.toLowerCase().includes('rec') && v === 'recording') return 'danger';
        return '';
      }

      if (loading) {
        return (
          <div className="empty-state">
            <div className="spinner" style={{width:'32px',height:'32px',margin:'0 auto 16px'}}></div>
            <p>Carregando status da camera...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div>
            <div className="card" style={{borderColor: 'var(--danger)'}}>
              <div className="card-header">
                <div className="card-title" style={{color:'var(--danger)'}}>
                  <span className="card-icon">{Icons.x}</span>
                  Erro de Conexao
                </div>
                <button className="btn btn-outline btn-sm" onClick={fetchStatus}>
                  <span className="card-icon">{Icons.refresh}</span> Tentar novamente
                </button>
              </div>
              <p style={{color:'var(--text-secondary)'}}>{error}</p>
              <p style={{color:'var(--text-muted)', marginTop:'8px', fontSize:'0.85rem'}}>
                Verifique a configuracao da camera na aba "Configuracao".
              </p>
            </div>
          </div>
        );
      }

      const sections = [
        {
          title: 'White Balance',
          icon: Icons.sun,
          items: [
            { label: 'Modo WB', key: 'wb_mode' },
            { label: 'Metodo WB', key: 'wb_method' },
            { label: 'Temperatura (K)', key: 'wb_kelvin' },
          ]
        },
        {
          title: 'Exposicao',
          icon: Icons.aperture,
          items: [
            { label: 'Iris', key: 'iris_value' },
            { label: 'Iris Metodo', key: 'iris_method' },
            { label: 'Ganho', key: 'gain_value' },
            { label: 'Ganho Metodo', key: 'gain_method' },
            { label: 'Shutter', key: 'shutter_value' },
            { label: 'Shutter Modo', key: 'shutter_mode' },
          ]
        },
        {
          title: 'Filtro ND',
          icon: Icons.disc,
          items: [
            { label: 'ND Metodo', key: 'nd_method' },
            { label: 'ND Valor', key: 'nd_value' },
          ]
        },
        {
          title: 'Gravacao',
          icon: Icons.video,
          items: [
            { label: 'Color Bars', key: 'colorbars_enabled' },
            { label: 'Color Bars Tipo', key: 'colorbars_type' },
          ]
        },
      ];

      return (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
              <span className="status-dot online"></span>
              <span style={{fontSize:'0.9rem',color:'var(--text-secondary)'}}>Camera conectada</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
              <label style={{fontSize:'0.8rem',color:'var(--text-muted)',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'}}>
                <input type="checkbox" checked={autoRefresh} onChange={e => setAutoRefresh(e.target.checked)} />
                Auto-refresh ({REFRESH_INTERVAL/1000}s)
              </label>
              <button className="btn btn-outline btn-sm" onClick={fetchStatus}>
                <span className="card-icon">{Icons.refresh}</span> Atualizar
              </button>
            </div>
          </div>

          {autoRefresh && (
            <div className="refresh-bar">
              <div className="refresh-bar-inner" style={{width: refreshProgress + '%'}}></div>
            </div>
          )}

          {sections.map((section, si) => (
            <div className="card" key={si}>
              <div className="card-header">
                <div className="card-title">
                  <span className="card-icon">{section.icon}</span>
                  {section.title}
                </div>
              </div>
              <div className="stat-grid">
                {section.items.map((item, ii) => {
                  const val = status?.[item.key];
                  const display = formatValue(val);
                  const cls = getValueClass(item.label, display);
                  return (
                    <div className="stat-item" key={ii}>
                      <div className="stat-label">{item.label}</div>
                      <div className={`stat-value ${cls}`}>{display}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}

          {status?.raw && (
            <div className="card">
              <div className="card-header">
                <div className="card-title">
                  <span className="card-icon">{Icons.zap}</span>
                  Dados Brutos (JSON)
                </div>
              </div>
              <pre style={{
                background:'var(--bg-input)', padding:'12px', borderRadius:'var(--radius-sm)',
                fontSize:'0.8rem', fontFamily:'var(--font-mono)', color:'var(--text-secondary)',
                overflow:'auto', maxHeight:'300px', border:'1px solid var(--border)'
              }}>
                {JSON.stringify(status.raw, null, 2)}
              </pre>
            </div>
          )}
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [cameraStatus, setCameraStatus] = useState('checking');

      // Check camera connectivity
      useEffect(() => {
        async function check() {
          setCameraStatus('checking');
          try {
            const res = await fetch('/api/config/test', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            });
            const data = await res.json();
            setCameraStatus(data.ok ? 'online' : 'offline');
          } catch {
            setCameraStatus('offline');
          }
        }
        check();
        const iv = setInterval(check, 15000);
        return () => clearInterval(iv);
      }, []);

      return (
        <div className="app-container">
          <ToastContainer />

          <div className="header">
            <div className="header-left">
              <span style={{width:'28px',height:'28px',color:'var(--accent)'}}>{Icons.camera}</span>
              <div>
                <h1>Z190 Control Madruga</h1>
                <span className="version">v2.0.0 — Sony PXW-Z190</span>
              </div>
            </div>
            <div className="header-right">
              <span className={`status-dot ${cameraStatus}`}></span>
              <span style={{fontSize:'0.85rem',color:'var(--text-secondary)'}}>
                {cameraStatus === 'online' ? 'Camera Online' :
                 cameraStatus === 'offline' ? 'Camera Offline' : 'Verificando...'}
              </span>
            </div>
          </div>

          <div className="tabs">
            <button className={`tab ${tab === 'dashboard' ? 'active' : ''}`}
              onClick={() => setTab('dashboard')}>
              Dashboard
            </button>
            <button className={`tab ${tab === 'config' ? 'active' : ''}`}
              onClick={() => setTab('config')}>
              Configuracao
            </button>
          </div>

          {tab === 'dashboard' && <DashboardPage />}
          {tab === 'config' && <ConfigPage onSave={() => setCameraStatus('checking')} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
